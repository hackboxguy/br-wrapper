# mpv input configuration for qt-mpv-wrapper
# Makes any mouse click or tap quit the video

# Mouse buttons
MOUSE_BTN0 quit
MOUSE_BTN1 quit
MOUSE_BTN2 quit
MOUSE_BTN3 quit
MOUSE_BTN4 quit

# Alternative mouse button names
MBTN_LEFT quit
MBTN_RIGHT quit
MBTN_MID quit

# Keyboard shortcuts (keep these)
q quit
ESC quit
SPACE cycle pause
LEFT seek -5
RIGHT seek +5
UP seek 60
DOWN seek -60
9 add volume -5
0 add volume 5
m cycle mute
